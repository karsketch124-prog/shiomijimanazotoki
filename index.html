<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>潮見島 なぞとき事件簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#0e1a2e;
    --navy-panel:#0a1322;
    --navy-soft:#1c2c47;
    --cream:#f5edd8;
    --cream-dim:#e8dcc0;
    --amber:#e0a84e;
    --amber-deep:#c8863a;
    --teal:#3f8f89;
    --ink:#2b2416;
    --danger:#c25c4c;
    --ok:#4c8f6a;
    --font-display:'Shippori Mincho', serif;
    --font-body:'Zen Maru Gothic', sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overflow-x:hidden;width:100%;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, rgba(224,168,78,0.10), transparent 45%),
      radial-gradient(ellipse at 90% 110%, rgba(63,143,137,0.14), transparent 50%),
      var(--navy-deep);
    color:var(--cream);
    font-family:var(--font-body);
    min-height:100vh;
    line-height:1.8;
  }
  ruby{ruby-position:over;}
  rt{font-size:0.55em;color:var(--amber);opacity:0.9;font-family:var(--font-body);}
  .app{
    max-width:720px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  /* --- header --- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding:10px 14px;
    padding-top:calc(10px + env(safe-area-inset-top, 0px));
    background:var(--navy-panel);
    border-bottom:1px solid rgba(224,168,78,0.25);
    position:sticky;
    top:0;
    z-index:10;
  }
  .topbar .brand{
    font-family:var(--font-display);
    font-weight:800;
    font-size:13px;
    color:var(--amber);
    letter-spacing:0.03em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .topbar .actions{display:flex;flex-shrink:0;}
  .topbar .actions button{
    background:none;
    border:1px solid rgba(224,168,78,0.4);
    color:var(--cream-dim);
    border-radius:20px;
    padding:9px 14px;
    font-family:var(--font-body);
    font-size:12.5px;
    cursor:pointer;
    margin-left:6px;
    min-height:38px;
    white-space:nowrap;
  }
  .topbar .actions button:hover{background:rgba(224,168,78,0.12);}

  /* --- main content wrapper --- */
  .stage{
    flex:1;
    width:100%;
    padding:22px 14px 50px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* --- title screen --- */
  .title-wrap{
    text-align:center;
    max-width:520px;
    margin-top:6vh;
  }
  .lantern{
    width:64px;height:64px;margin:0 auto 18px;
    border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #fff2cf, var(--amber) 55%, var(--amber-deep) 100%);
    box-shadow:0 0 40px 8px rgba(224,168,78,0.35);
  }
  h1.game-title{
    font-family:var(--font-display);
    font-weight:800;
    font-size:34px;
    margin:0 0 6px;
    color:var(--cream);
    letter-spacing:0.04em;
  }
  .game-sub{
    font-size:13px;
    color:var(--amber);
    letter-spacing:0.15em;
    margin-bottom:28px;
  }
  .wave-divider{
    width:100%;
    height:14px;
    margin:22px 0;
    background-image:radial-gradient(circle at 10px 0, transparent 9px, var(--teal) 10px);
    background-size:20px 14px;
    background-repeat:repeat-x;
    opacity:0.5;
  }
  .field-group{
    text-align:left;
    margin:14px 0;
  }
  .field-group label{
    display:block;
    font-size:12.5px;
    color:var(--cream-dim);
    margin-bottom:6px;
  }
  input[type=text], input[type=number]{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid rgba(224,168,78,0.35);
    background:var(--navy-panel);
    color:var(--cream);
    font-family:var(--font-body);
    font-size:16px;
    outline:none;
    -moz-appearance:textfield;
  }
  input[type=text]:focus, input[type=number]:focus{border-color:var(--amber);}
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .btn{
    display:inline-block;
    font-family:var(--font-body);
    font-weight:700;
    font-size:15px;
    padding:13px 28px;
    border-radius:30px;
    border:none;
    cursor:pointer;
    transition:transform .12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:linear-gradient(180deg, var(--amber), var(--amber-deep));color:#241a08;}
  .btn-ghost{background:transparent;border:1px solid rgba(245,237,216,0.35);color:var(--cream);}
  .btn-teal{background:var(--teal);color:#062522;}
  .btn-danger{background:transparent;border:1px solid rgba(194,92,76,0.6);color:#e69f92;}
  .btn[disabled]{opacity:0.35;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px;}

  /* --- chapter select --- */
  .chapter-board{width:100%;max-width:560px;}
  .board-title{font-family:var(--font-display);font-size:22px;color:var(--amber);text-align:center;margin-bottom:4px;}
  .board-sub{text-align:center;font-size:12.5px;color:var(--cream-dim);margin-bottom:26px;}
  .chapter-list{display:flex;flex-direction:column;gap:12px;}
  .chapter-card{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--navy-panel);
    border:1px solid rgba(224,168,78,0.2);
    border-radius:14px;
    padding:14px 16px;
    position:relative;
  }
  .chapter-card.locked{opacity:0.45;}
  .chapter-card.done{border-color:rgba(76,143,106,0.6);}
  .ch-num{
    font-family:var(--font-display);
    font-weight:800;
    font-size:20px;
    color:var(--navy-deep);
    background:var(--amber);
    width:38px;height:38px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .chapter-card.locked .ch-num{background:#555;color:#ccc;}
  .ch-info{flex:1;}
  .ch-info .ch-title{font-weight:700;font-size:15px;color:var(--cream);}
  .ch-info .ch-status{font-size:11.5px;color:var(--cream-dim);margin-top:2px;}
  .ch-go{background:none;border:none;color:var(--amber);font-size:13px;cursor:pointer;font-weight:700;}

  /* --- story screen --- */
  .story-card{
    max-width:560px;width:100%;
    background:var(--navy-panel);
    border:1px solid rgba(224,168,78,0.22);
    border-radius:16px;
    padding:22px 18px;
    position:relative;
  }
  .story-eyebrow{font-size:11.5px;letter-spacing:0.14em;color:var(--amber);margin-bottom:8px;}
  .story-title{font-family:var(--font-display);font-size:22px;color:var(--cream);margin:0 0 16px;}
  .story-text{font-size:15px;color:var(--cream-dim);white-space:pre-line;}
  .story-text ruby{color:var(--cream);}

  /* --- puzzle screen --- */
  .puzzle-card{
    max-width:560px;width:100%;
    background:var(--navy-panel);
    border:1px solid rgba(224,168,78,0.22);
    border-radius:16px;
    padding:20px 16px;
  }
  .puzzle-tag{
    display:inline-block;
    font-size:11px;
    color:var(--navy-deep);
    background:var(--teal);
    padding:3px 10px;
    border-radius:12px;
    margin-bottom:10px;
  }
  .puzzle-title{font-family:var(--font-display);font-size:19px;color:var(--cream);margin:0 0 14px;}
  .puzzle-prompt{font-size:15px;color:var(--cream-dim);margin-bottom:16px;white-space:pre-line;}
  .puzzle-prompt ruby{color:var(--cream);}
  .cipher-box{
    background:var(--navy-deep);
    border:1px dashed rgba(224,168,78,0.4);
    border-radius:10px;
    padding:14px 8px;
    text-align:center;
    font-size:clamp(16px, 5.5vw, 20px);
    letter-spacing:0.06em;
    color:var(--amber);
    margin-bottom:16px;
    word-break:break-word;
    overflow-wrap:break-word;
  }
  .gojuon-table{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:4px;
    font-size:clamp(10px, 3.2vw, 12px);
    background:var(--navy-deep);
    border-radius:10px;
    padding:10px 4px;
    margin-bottom:16px;
    text-align:center;
    color:var(--cream-dim);
  }
  .gojuon-table div{padding:4px 0;}
  .choice-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .choice-opt{
    text-align:left;
    padding:14px 16px;
    min-height:48px;
    display:flex;
    align-items:center;
    border-radius:10px;
    border:1px solid rgba(245,237,216,0.25);
    background:var(--navy-deep);
    color:var(--cream);
    cursor:pointer;
    font-family:var(--font-body);
    font-size:15px;
  }
  .choice-opt.selected{border-color:var(--amber);background:rgba(224,168,78,0.14);}
  .answer-row{display:flex;gap:8px;margin-bottom:16px;}
  .answer-row input{flex:1;}
  .time-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px;}
  .time-field{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .time-field input{
    width:84px;
    text-align:center;
    font-size:22px;
    font-weight:700;
    padding:10px 6px;
  }
  .time-field label{font-size:13px;color:var(--cream-dim);}
  .feedback{
    font-size:13.5px;
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:14px;
    display:none;
  }
  .feedback.show{display:block;}
  .feedback.wrong{background:rgba(194,92,76,0.16);color:#f0b3a6;}
  .feedback.correct{background:rgba(76,143,106,0.18);color:#a9e0c1;}
  .hint-box{
    background:rgba(224,168,78,0.08);
    border-left:3px solid var(--amber);
    border-radius:8px;
    padding:12px 14px;
    font-size:13.5px;
    color:var(--cream-dim);
    margin-bottom:14px;
    display:none;
  }
  .hint-box.show{display:block;}
  .hint-box .who{color:var(--amber);font-weight:700;font-size:12px;margin-bottom:4px;display:block;}
  .puzzle-controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:6px;}
  .attempt-note{font-size:11.5px;color:var(--cream-dim);text-align:right;opacity:0.7;margin-bottom:8px;}

  /* --- chapter end --- */
  .end-card{max-width:560px;width:100%;text-align:center;}
  .end-badge{
    width:70px;height:70px;border-radius:50%;
    background:linear-gradient(180deg,var(--amber),var(--amber-deep));
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 16px;font-size:30px;color:#241a08;
  }

  .footnote{
    text-align:center;
    font-size:11px;
    color:rgba(245,237,216,0.35);
    padding:10px;
  }

  .btn{min-height:46px;display:inline-flex;align-items:center;justify-content:center;}

  @media (max-width:480px){
    h1.game-title{font-size:24px;}
    .game-sub{font-size:12px;}
    .story-card,.puzzle-card{padding:16px 14px;}
    .story-title,.puzzle-title{font-size:18px;}
    .story-text,.puzzle-prompt{font-size:14px;}
    .btn-row{gap:8px;}
    .btn{width:100%;}
    .btn-row .btn{flex:1 1 auto;}
    .puzzle-controls .btn{width:100%;}
    .chapter-card{padding:12px 12px;}
    .ch-info .ch-title{font-size:14px;}
  }

  @media (max-width:360px){
    .topbar .brand{font-size:12px;}
    .gojuon-table{grid-template-columns:repeat(4,1fr);}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar" id="topbar" style="display:none;">
    <div class="brand">潮見島 なぞとき事件簿</div>
    <div class="actions">
      <button id="btnSaveTop">セーブ</button>
      <button id="btnMenuTop">もくじ</button>
    </div>
  </div>
  <div class="stage" id="stage"></div>
  <div class="footnote">自由研究「なぞとき事件簿」プロトタイプ ・ 第1章</div>
</div>

<script>
/* =========================================================
   ゲームデータ
========================================================= */

// 50音（濁点・拗音なし の基本46音）
const GOJUON = ['あ','い','う','え','お','か','き','く','け','こ','さ','し','す','せ','そ',
  'た','ち','つ','て','と','な','に','ぬ','ね','の','は','ひ','ふ','へ','ほ',
  'ま','み','む','め','も','や','ゆ','よ','ら','り','る','れ','ろ','わ','を','ん'];

function shiftKana(ch, shift){
  const idx = GOJUON.indexOf(ch);
  if(idx === -1) return ch;
  return GOJUON[(idx + shift + GOJUON.length) % GOJUON.length];
}
function encodeCipher(text, shift){
  return text.split('').map(c => shiftKana(c, shift)).join('');
}
function normalizeAnswer(s){
  return s.replace(/[\s　:：時分]/g,'').replace(/[０-９]/g, d => '0123456789'['０１２３４５６７８９'.indexOf(d)]);
}

const CHAPTERS = [
  {
    id: 1,
    title: '<ruby>依頼<rt>いらい</rt></ruby>を受ける',
    intro: true,
    story: () => `
<ruby>${game.dName()}</ruby>の<ruby>事務所<rt>じむしょ</rt></ruby>に、一通の<ruby>手紙<rt>てがみ</rt></ruby>が<ruby>届<rt>とど</rt></ruby>いた。
差出人は、<ruby>瀬戸内<rt>せとうち</rt></ruby>の小さな<ruby>島<rt>しま</rt></ruby>「<ruby>潮見島<rt>しおみじま</rt></ruby>」に住む、<ruby>川尻陽菜<rt>かわしりひな</rt></ruby>という<ruby>女性<rt>じょせい</rt></ruby>だった。

「はじめまして。<ruby>私<rt>わたし</rt></ruby>の<ruby>祖母<rt>そぼ</rt></ruby>は<ruby>名前<rt>なまえ</rt></ruby>を<ruby>みなも</rt>といいます。<ruby>今<rt>いま</rt></ruby>から<ruby>50年前<rt>ごじゅうねんまえ</rt></ruby>、<ruby>祖母<rt>そぼ</rt></ruby>の<ruby>姉<rt>あね</rt></ruby>にあたる<ruby>人<rt>ひと</rt></ruby>が、<ruby>島<rt>しま</rt></ruby>の<ruby>夏祭<rt>なつまつ</rt></ruby>りの<ruby>夜<rt>よる</rt></ruby>に<ruby>姿<rt>すがた</rt></ruby>を<ruby>消<rt>け</rt></ruby>しました。<ruby>警察<rt>けいさつ</rt></ruby>もずっと<ruby>探<rt>さが</rt></ruby>しましたが、<ruby>手<rt>て</rt></ruby>がかりひとつ<ruby>見<rt>み</rt></ruby>つからず、<ruby>事件<rt>じけん</rt></ruby>は<ruby>迷宮入<rt>めいきゅうい</rt></ruby>りになってしまいました。
<ruby>先日<rt>せんじつ</rt></ruby>、<ruby>祖母<rt>そぼ</rt></ruby>の<ruby>家<rt>いえ</rt></ruby>から<ruby>古<rt>ふる</rt></ruby>い<ruby>箱<rt>はこ</rt></ruby>が<ruby>見<rt>み</rt></ruby>つかり、その<ruby>中<rt>なか</rt></ruby>に<ruby>暗号<rt>あんごう</rt></ruby>のような<ruby>言葉<rt>ことば</rt></ruby>が<ruby>書<rt>か</rt></ruby>かれた<ruby>紙<rt>かみ</rt></ruby>が<ruby>入<rt>はい</rt></ruby>っていました。どうか、この<ruby>50年前<rt>ごじゅうねんまえ</rt></ruby>の<ruby>事件<rt>じけん</rt></ruby>を<ruby>調<rt>しら</rt></ruby>べていただけないでしょうか。」

${game.dName()}はさっそく、<ruby>相棒<rt>あいぼう</rt></ruby>の<ruby>警察官<rt>けいさつかん</rt></ruby>・${game.pName()}とともに、<ruby>船<rt>ふね</rt></ruby>で<ruby>潮見島<rt>しおみじま</rt></ruby>へ<ruby>向<rt>む</rt></ruby>かうことにした。

「50<ruby>年前<rt>ねんまえ</rt></ruby>の<ruby>事件<rt>じけん</rt></ruby>か……<ruby>実<rt>じつ</rt></ruby>は<ruby>俺<rt>おれ</rt></ruby>の<ruby>祖父<rt>そふ</rt></ruby>も、<ruby>昔<rt>むかし</rt></ruby>この<ruby>島<rt>しま</rt></ruby>の<ruby>事件<rt>じけん</rt></ruby>を<ruby>担当<rt>たんとう</rt></ruby>していたらしいんだ。<ruby>解決<rt>かいけつ</rt></ruby>できなかったことを、ずっと<ruby>悔<rt>く</rt></ruby>やんでいたって<ruby>聞<rt>き</rt></ruby>いたことがある。」
${game.pName()}はそう言うと、<ruby>少<rt>すこ</rt></ruby>し<ruby>遠<rt>とお</rt></ruby>くを<ruby>見<rt>み</rt></ruby>つめた。

<ruby>島<rt>しま</rt></ruby>に<ruby>着<rt>つ</rt></ruby>いた<ruby>二人<rt>ふたり</rt></ruby>は、<ruby>陽菜<rt>ひな</rt></ruby>さんから<ruby>預<rt>あず</rt></ruby>かった<ruby>暗号<rt>あんごう</rt></ruby>の<ruby>紙<rt>かみ</rt></ruby>を<ruby>広<rt>ひろ</rt></ruby>げた。`,
    puzzles: [
      {
        id:'c1p1', type:'cipher', shift:2,
        answer:'はこをみつけて',
        title:'<ruby>暗号<rt>あんごう</rt></ruby>の<ruby>紙<rt>かみ</rt></ruby>',
        prompt:`<ruby>紙<rt>かみ</rt></ruby>には、ひらがなの<ruby>羅列<rt>られつ</rt></ruby>が<ruby>書<rt>か</rt></ruby>かれている。よく見ると、すべての<ruby>文字<rt>もじ</rt></ruby>が「50<ruby>音表<rt>おんひょう</rt></ruby>」の<ruby>上<rt>うえ</rt></ruby>で<ruby>同<rt>おな</rt></ruby>じ<ruby>数<rt>かず</rt></ruby>だけずれているようだ。<br>下の<ruby>表<rt>ひょう</rt></ruby>を<ruby>使<rt>つか</rt></ruby>って、<ruby>元<rt>もと</rt></ruby>の<ruby>言葉<rt>ことば</rt></ruby>を<ruby>読<rt>よ</rt></ruby>み<ruby>解<rt>と</rt></ruby>こう。`,
        showTable:true,
        hint1:`${'{{P}}'}「50<ruby>音表<rt>おんひょう</rt></ruby>を、<ruby>順番通<rt>じゅんばんどお</rt></ruby>りに<ruby>2<rt>ふた</rt></ruby>つずつ<ruby>後<rt>うし</rt></ruby>ろにずらして<ruby>書<rt>か</rt></ruby>かれているみたいだよ。たとえば『あ』は『う』に、『い』は『え』になっている。1<ruby>文字<rt>もじ</rt></ruby>ずつ、<ruby>表<rt>ひょう</rt></ruby>を<ruby>2<rt>ふた</rt></ruby>つ<ruby>戻<rt>もど</rt></ruby>して<ruby>読<rt>よ</rt></ruby>んでみよう。」`,
        hint2:`${'{{P}}'}「じゃあ、<ruby>一緒<rt>いっしょ</rt></ruby>に<ruby>最初<rt>さいしょ</rt></ruby>の<ruby>文字<rt>もじ</rt></ruby>だけ<ruby>解<rt>と</rt></ruby>いてみよう。<ruby>暗号<rt>あんごう</rt></ruby>の<ruby>1<rt>いち</rt></ruby><ruby>文字目<rt>もじめ</rt></ruby>は『は』を<ruby>2<rt>ふた</rt></ruby>つ<ruby>後<rt>うし</rt></ruby>ろにずらした<ruby>文字<rt>もじ</rt></ruby>だ。50<ruby>音表<rt>おんひょう</rt></ruby>で『は』から<ruby>2<rt>ふた</rt></ruby>つ<ruby>前<rt>まえ</rt></ruby>を<ruby>数<rt>かぞ</rt></ruby>えると……『な』だね。<ruby>残<rt>のこ</rt></ruby>りの<ruby>文字<rt>もじ</rt></ruby>も、<ruby>同<rt>おな</rt></ruby>じように<ruby>2<rt>ふた</rt></ruby>つずつ<ruby>前<rt>まえ</rt></ruby>に<ruby>戻<rt>もど</rt></ruby>して<ruby>読<rt>よ</rt></ruby>んでみて。」`
      },
      {
        id:'c1p2', type:'time',
        correctHour:17, correctMinute:45,

/* =========================================================
   ゲーム状態管理
========================================================= */
const SAVE_KEY = 'shiomijima-save-v1';

let game = {
  detectiveName:'',
  partnerName:'',
  currentChapter:1,
  currentPuzzleIndex:0,
  progress:{}, // { c1p1: {solved:true, attempts:2, skipped:false}, ... }
  clearedChapters:[],
  dName(){ return this.detectiveName || '名探偵'; },
  pName(){ return this.partnerName || '相棒'; }
};

let ui = { wrongCount:{}, hintShown:{}, hint2Shown:{}, selectedChoice:null };

function puzzleState(id){
  if(!game.progress[id]) game.progress[id] = {solved:false, attempts:0, skipped:false};
  return game.progress[id];
}

async function withRetry(fn, retries){
  retries = retries === undefined ? 2 : retries;
  let lastErr;
  for(let i=0; i<=retries; i++){
    try{ return await fn(); }
    catch(e){ lastErr = e; await new Promise(r=>setTimeout(r, 300)); }
  }
  throw lastErr;
}

function storageReady(){
  return typeof window.storage !== 'undefined' && window.storage !== null;
}

async function saveGame(silent){
  if(!storageReady()){
    if(!silent) toast('セーブ機能がこの画面では使えないみたいです', true);
    return false;
  }
  try{
    const data = {
      detectiveName: game.detectiveName,
      partnerName: game.partnerName,
      currentChapter: game.currentChapter,
      currentPuzzleIndex: game.currentPuzzleIndex,
      progress: game.progress,
      clearedChapters: game.clearedChapters
    };
    await withRetry(() => window.storage.set(SAVE_KEY, JSON.stringify(data), false));
    if(!silent) toast('セーブしました');
    return true;
  }catch(e){
    console.error('save failed', e);
    if(!silent) toast('セーブに失敗しました。もう一度ためしてね', true);
    return false;
  }
}

async function loadGame(){
  if(!storageReady()) return {data:null, error:'unavailable'};
  try{
    const res = await withRetry(() => window.storage.get(SAVE_KEY, false));
    if(!res) return {data:null, error:null};
    return {data: JSON.parse(res.value), error:null};
  }catch(e){
    // storage.get throws when the key doesn't exist yet — that's normal, not an error
    return {data:null, error:null};
  }
}

function toast(message, isError){
  let el = document.getElementById('toastMsg');
  if(!el){
    el = document.createElement('div');
    el.id = 'toastMsg';
    el.style.position = 'fixed';
    el.style.left = '50%';
    el.style.bottom = '24px';
    el.style.transform = 'translateX(-50%)';
    el.style.padding = '10px 18px';
    el.style.borderRadius = '20px';
    el.style.fontSize = '13px';
    el.style.fontFamily = "'Zen Maru Gothic', sans-serif";
    el.style.zIndex = '999';
    el.style.transition = 'opacity .3s ease';
    document.body.appendChild(el);
  }
  el.style.background = isError ? '#c25c4c' : '#4c8f6a';
  el.style.color = '#fff';
  el.textContent = message;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity = '0'; }, 2000);
}

const topbar = document.getElementById('topbar');

function showTopbar(show){ topbar.style.display = show ? 'flex' : 'none'; }

  const { data: existing } = await loadGame();

      </div>
      <div class="field-group">
        <label><ruby>相棒<rt>あいぼう</rt></ruby>の<ruby>警察官<rt>けいさつかん</rt></ruby>の<ruby>名前<rt>なまえ</rt></ruby></label>

      </div>
      <div class="btn-row">

      </div>
    </div>
  `;
  document.getElementById('btnStart').onclick = () => {
    if(existing){
      const ok = confirm('さいしょからはじめると、これまでのセーブデータは消えてしまいます。よろしいですか？');
      if(!ok) return;
    }
    const d = document.getElementById('inputDetective').value.trim();
    const p = document.getElementById('inputPartner').value.trim();
    game.detectiveName = d || '名探偵';
    game.partnerName = p || '相棒';
    game.currentChapter = 1;
    game.progress = {};
    game.clearedChapters = [];
    saveGame(true);
    renderChapters();
  };
  if(existing){
    document.getElementById('btnContinue').onclick = () => {
      game.detectiveName = existing.detectiveName;
      game.partnerName = existing.partnerName;
      game.currentChapter = existing.currentChapter || 1;
      game.currentPuzzleIndex = existing.currentPuzzleIndex || 0;
      game.progress = existing.progress || {};
      game.clearedChapters = existing.clearedChapters || [];

      const ch = CHAPTERS.find(c => c.id === game.currentChapter);
      if(ch && !ch.comingSoon && !game.clearedChapters.includes(ch.id)){
        const idx = Math.min(game.currentPuzzleIndex, ch.puzzles.length - 1);
        renderPuzzle(ch.id, idx);
      } else {
        renderChapters();
      }
      toast('つづきを読み込みました');
    };
  }
}

function chapterStatus(ch){
  if(ch.comingSoon) return {label:'問題づくり中…', locked:true};
  const cleared = game.clearedChapters.includes(ch.id);
  if(cleared) return {label:'クリア ✓', locked:false, done:true};
  const unlocked = ch.id === 1 || game.clearedChapters.includes(ch.id - 1);
  if(!unlocked) return {label:'ロック中', locked:true};
  return {label:'ちょうせん可能', locked:false};
}

function renderChapters(){
  showTopbar(true);
  const cards = CHAPTERS.map(ch => {
    const st = chapterStatus(ch);
    return `
      <div class="chapter-card ${st.locked?'locked':''} ${st.done?'done':''}">
        <div class="ch-num">${ch.id}</div>
        <div class="ch-info">
          <div class="ch-title">${ch.title}</div>
          <div class="ch-status">${st.label}</div>
        </div>
        ${!st.locked ? `<button class="ch-go" data-ch="${ch.id}">${st.done?'見直す':'ひらく'} ›</button>` : ''}
      </div>
    `;
  }).join('');

  stage.innerHTML = `
    <div class="chapter-board">
      <div class="board-title">事件ファイル</div>
      <div class="board-sub">${game.dName()} と ${game.pName()} の捜査記録</div>
      <div class="chapter-list">${cards}</div>
    </div>
  `;
  stage.querySelectorAll('.ch-go').forEach(btn=>{
    btn.onclick = () => {
      const id = parseInt(btn.dataset.ch);
      game.currentChapter = id;
      game.currentPuzzleIndex = 0;
      renderStory(id);
    };
  });
  document.getElementById('btnSaveTop').onclick = () => saveGame(false);
  document.getElementById('btnMenuTop').onclick = () => renderChapters();
}

function renderStory(chapterId){
  showTopbar(true);
  const ch = CHAPTERS.find(c=>c.id===chapterId);
  stage.innerHTML = `
    <div class="story-card">
      <div class="story-eyebrow">第${ch.id}章</div>
      <h2 class="story-title">${ch.title}</h2>
      <div class="story-text">${ch.story()}</div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnToPuzzle">なぞをとく</button>
        <button class="btn btn-ghost" id="btnBackBoard">もくじへ</button>
      </div>
    </div>
  `;
  document.getElementById('btnToPuzzle').onclick = () => {
    game.currentPuzzleIndex = 0;
    renderPuzzle(chapterId, 0);
  };
  document.getElementById('btnBackBoard').onclick = renderChapters;
  document.getElementById('btnSaveTop').onclick = () => saveGame(false);
  document.getElementById('btnMenuTop').onclick = () => renderChapters();
}

function renderPuzzle(chapterId, index){
  showTopbar(true);
  const ch = CHAPTERS.find(c=>c.id===chapterId);
  const puzzle = ch.puzzles[index];
  const pid = puzzle.id;
  const ps = puzzleState(pid);
  ui.wrongCount[pid] = ps.attempts || 0;
  ui.selectedChoice = null;

  let bodyHtml = '';
  if(puzzle.type === 'cipher'){
    const cipherText = encodeCipher(puzzle.answer, puzzle.shift);
    bodyHtml = `
      <div class="cipher-box">${cipherText.split('').join(' ')}</div>
      ${puzzle.showTable ? `<div class="gojuon-table">${GOJUON.map(k=>`<div>${k}</div>`).join('')}</div>` : ''}
      <div class="answer-row">
        <input type="text" id="answerInput" placeholder="読み解いた言葉を入力">
      </div>
    `;
  } else if(puzzle.type === 'text'){
    bodyHtml = `
      <div class="answer-row">
        <input type="text" id="answerInput" placeholder="答えを入力">
      </div>
    `;
  } else if(puzzle.type === 'time'){
    bodyHtml = `
      <div class="time-row">
        <div class="time-field">
          <input type="number" inputmode="numeric" id="answerHour" placeholder="00" min="0" max="23">
          <label>時</label>
        </div>
        <div class="time-field">
          <input type="number" inputmode="numeric" id="answerMinute" placeholder="00" min="0" max="59">
          <label>分</label>
        </div>
      </div>
    `;
  } else if(puzzle.type === 'choice'){
    bodyHtml = `
      <div class="choice-list">
        ${puzzle.options.map((opt,i)=>`<div class="choice-opt" data-i="${i}">${opt}</div>`).join('')}
      </div>
    `;
  }

  stage.innerHTML = `
    <div class="puzzle-card">
      <span class="puzzle-tag">なぞ ${index+1} / ${ch.puzzles.length}</span>
      <h3 class="puzzle-title">${puzzle.title}</h3>
      <div class="puzzle-prompt">${puzzle.prompt}</div>
      ${bodyHtml}
      <div class="feedback" id="feedback"></div>
      <div class="hint-box" id="hintBox"></div>
      <div class="attempt-note" id="attemptNote"></div>
      <div class="puzzle-controls">
        <button class="btn btn-primary" id="btnSubmit">こたえる</button>
        <button class="btn btn-teal" id="btnHint">${game.pName()}に相談する</button>
        <button class="btn btn-danger" id="btnSkip">スキップする</button>
      </div>
    </div>
  `;

  if(puzzle.type === 'choice'){
    stage.querySelectorAll('.choice-opt').forEach(opt=>{
      opt.onclick = () => {
        stage.querySelectorAll('.choice-opt').forEach(o=>o.classList.remove('selected'));
        opt.classList.add('selected');
        ui.selectedChoice = parseInt(opt.dataset.i);
      };
    });
  }

  updateAttemptNote(pid);

  document.getElementById('btnSubmit').onclick = () => submitAnswer(chapterId, index);
  document.getElementById('btnHint').onclick = () => showHint(chapterId, index);
  document.getElementById('btnSkip').onclick = () => confirmSkip(chapterId, index);
  document.getElementById('btnSaveTop').onclick = () => saveGame(false);
  document.getElementById('btnMenuTop').onclick = () => renderChapters();
}

function updateAttemptNote(pid){
  const note = document.getElementById('attemptNote');
  if(!note) return;
  const wrong = ui.wrongCount[pid] || 0;
  note.textContent = wrong > 0 ? `まちがえた回数：${wrong}回` : '';
}

function submitAnswer(chapterId, index){
  const ch = CHAPTERS.find(c=>c.id===chapterId);
  const puzzle = ch.puzzles[index];
  const pid = puzzle.id;
  const ps = puzzleState(pid);
  const feedback = document.getElementById('feedback');

  let correct = false;
  if(puzzle.type === 'choice'){
    correct = (ui.selectedChoice === puzzle.correct);
  } else if(puzzle.type === 'time'){
    const h = parseInt(document.getElementById('answerHour').value, 10);
    const m = parseInt(document.getElementById('answerMinute').value, 10);
    correct = (h === puzzle.correctHour && m === puzzle.correctMinute);
  } else {
    const raw = document.getElementById('answerInput').value;
    const norm = normalizeAnswer(raw);
    const answers = Array.isArray(puzzle.answer) ? puzzle.answer : [puzzle.answer];
    correct = answers.some(a => normalizeAnswer(a) === norm);
  }

  if(correct){
    ps.solved = true;
    feedback.className = 'feedback show correct';
    feedback.textContent = `正解！ ${game.pName()}「よくやったな、${game.dName()}！」`;
    saveGame(true);
    setTimeout(()=> advancePuzzle(chapterId, index), 900);
  } else {
    ps.attempts = (ps.attempts || 0) + 1;
    ui.wrongCount[pid] = ps.attempts;
    feedback.className = 'feedback show wrong';
    feedback.textContent = 'うーん、ちがうみたい。もう一度考えてみよう。';
    updateAttemptNote(pid);
    saveGame(true);
  }
}

function showHint(chapterId, index){
  const ch = CHAPTERS.find(c=>c.id===chapterId);
  const puzzle = ch.puzzles[index];
  const pid = puzzle.id;
  const wrong = ui.wrongCount[pid] || 0;
  const hintBox = document.getElementById('hintBox');
  hintBox.classList.add('show');

  const useHint2 = wrong >= 5;
  const text = (useHint2 ? puzzle.hint2 : puzzle.hint1).replace(/\{\{P\}\}/g, `<span class="who">${game.pName()}より</span>`);
  hintBox.innerHTML = text;
}

function confirmSkip(chapterId, index){
  const ok = confirm('この問題をスキップしますか？(相棒が答えを教えてくれます)');
  if(!ok) return;
  const ch = CHAPTERS.find(c=>c.id===chapterId);
  const puzzle = ch.puzzles[index];
  const pid = puzzle.id;
  const ps = puzzleState(pid);
  ps.solved = true;
  ps.skipped = true;
  saveGame(true);
  advancePuzzle(chapterId, index);
}

function advancePuzzle(chapterId, index){
  const ch = CHAPTERS.find(c=>c.id===chapterId);
  if(index + 1 < ch.puzzles.length){
    game.currentPuzzleIndex = index + 1;
    renderPuzzle(chapterId, index + 1);
  } else {
    if(!game.clearedChapters.includes(chapterId)){
      game.clearedChapters.push(chapterId);
    }
    saveGame(true);
    renderChapterEnd(chapterId);
  }
}

function renderChapterEnd(chapterId){
  showTopbar(true);
  const ch = CHAPTERS.find(c=>c.id===chapterId);
  stage.innerHTML = `
    <div class="end-card">
      <div class="end-badge">✓</div>
      <h2 class="story-title">第${ch.id}章 クリア！</h2>
      <div class="story-card" style="margin-top:16px;text-align:left;">
        <div class="story-text">${ch.ending ? ch.ending() : ''}</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnBackBoard2">もくじへもどる</button>
      </div>
    </div>
  `;
  document.getElementById('btnBackBoard2').onclick = renderChapters;
  document.getElementById('btnSaveTop').onclick = () => saveGame(false);
  document.getElementById('btnMenuTop').onclick = () => renderChapters();
}

/* =========================================================
   起動
========================================================= */
renderTitle();
</script>
</body>
</html>
